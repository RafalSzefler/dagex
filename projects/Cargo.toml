[workspace]
members = [
    "utils/array",
    "utils/tagged_pointer",
    "utils/cancellation_token",
    "utils/fnv1a_hasher",
    "utils/immutable_string",
    "dagex",
    "dagex_visualization",
    "dagex_algorithms",
]
resolver = "2"

[workspace.package]
version = "0.0.4"
edition = "2021"
authors = ["Rafal Szefler <rafael.szefler@gmail.com>"]
rust-version = "1.78"

[workspace.dependencies]
getrandom = "0.2"
rand = "0.8"
ctor = "0.2"
smallvec = "1.13"
fasthash = "0.4"
rstest = "0.21"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
regex = "1.10"
